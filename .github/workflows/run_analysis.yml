name: Automated El Paso Zoning Compliance Audit

on:
  workflow_dispatch: # Allows you to click a button on GitHub to run it manually
  schedule:
    - cron: '0 0 1 * *' # Automatically runs once a month (at midnight on the 1st)

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 1 - Ingest El Paso Municode Title 20
      run: python src/ingest_el_paso_zoning.py

    - name: Step 2 - Execute State Legislation Compliance Check
      run: python src/analyze_compliance.py

    - name: Commit and Push Updated Audit Reports
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add el_paso_zoning_text_master.csv el_paso_compliance_audit_report.csv
        git diff-index --quiet HEAD || git commit -m "Automated Data Update: Refreshed zoning index and compliance report"
        git push
