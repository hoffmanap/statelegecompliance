name: Automated El Paso Zoning Compliance Audit

on:
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Crucial: Gives the runner permission to write new files to your repo

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run El Paso Zoning Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: |
          python3 radar_sweep.py

      - name: Commit and Push Updated Compliance Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force git to track the freshly generated file
          git add legislation_master.csv 
          
          # Only commit if the file actually changed or is brand new
          git diff-index --quiet HEAD || (git commit -m "Automated update: El Paso zoning compliance data" && git push)
