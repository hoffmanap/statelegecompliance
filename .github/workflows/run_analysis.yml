- name: Run El Paso Zoning Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: |
          python3 radar_sweep.py

      - name: Commit and Push Updated Compliance Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add legislation_master.csv  # Make sure this matches your script's exact output file name
          git diff-index --quiet HEAD || (git commit -m "Automated update: El Paso zoning compliance data" && git push)
