name: Automated El Paso Zoning Compliance Audit

on:
  workflow_dispatch: # Allows you to trigger this manually via the Actions button

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Grants permission to push code updates back to the repo if needed

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-level: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run El Paso Zoning Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Maps your API secret safely
        run: |
          python src/radar_sweep.py  # Make sure this points to your correct script path
