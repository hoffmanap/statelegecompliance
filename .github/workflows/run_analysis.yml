name: Automated El Paso Zoning Compliance Audit

on:
  workflow_dispatch: # Allows you to trigger this manually via the Actions button

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Grants permission to push code or data updates back to the repo

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run El Paso Zoning Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: |
          python3 radar_sweep.py # Fixed: Pointing directly to the root script
